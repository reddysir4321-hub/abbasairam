<!DOCTYPE html>
<html>
<head>
<title>Payment Page</title>
 
<style>

body{

    font-family: Arial;

    background:#f2f2f2;

}
 
.box{

    width:350px;

    margin:120px auto;

    padding:20px;

    background:white;

    border-radius:5px;

    box-shadow:0 0 10px gray;

}
 
input{

    width:100%;

    padding:10px;

    margin:10px 0;

}
 
button{

    width:100%;

    padding:10px;

    background:#2196F3;

    color:white;

    border:none;

}
</style>
</head>
 
<body>
 
<div class="box">
 
<h2>Payment</h2>
 
<form>
 
<input type="text" placeholder="Card Number">
 
<input type="text" placeholder="Card Holder Name">
 
<input type="text" placeholder="Expiry Date">
 
<input type="password" placeholder="CVV">
 
<button type="submit">Pay Now</button>
 
</form>
 
</div>
 
</body>
</html>
