<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
 
<style>

body{

    font-family: Arial;

    background:#f2f2f2;

}
 
.box{

    width:300px;

    margin:120px auto;

    padding:20px;

    background:white;

    border-radius:5px;

    box-shadow:0 0 10px gray;

}
 
input{

    width:100%;

    padding:10px;

    margin:10px 0;

}
 
button{

    width:100%;

    padding:10px;

    background:#4CAF50;

    color:white;

    border:none;

}
</style>
</head>
 
<body>
 
<div class="box">
 
<h2>Login</h2>
 
<form action="payment.html">
 
<input type="text" placeholder="Username" required>
 
<input type="password" placeholder="Password" required>
 
<button type="submit">Login</button>
 
</form>
 
</div>
 
</body>
</html>
